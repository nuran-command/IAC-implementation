global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'order-service'
    metrics_path: /
    static_configs:
      - targets: ['order-service:80']

  - job_name: 'frontend'
    metrics_path: /
    static_configs:
      - targets: ['frontend:80']